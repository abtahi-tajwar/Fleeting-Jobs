server:
  port: 8000

spring:
  application:
    name: fleeting-jobs-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://localhost:5432/fleeting_jobs
    username: fleeting
    password: fleeting
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

worker:
  base-url: http://localhost:8001

app:
  cors-origins: http://localhost:3000
