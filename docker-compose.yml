services:
  postgres:
    image: postgres:16-alpine
    container_name: fleeting-jobs-db
    environment:
      POSTGRES_USER: fleeting
      POSTGRES_PASSWORD: fleeting
      POSTGRES_DB: fleeting_jobs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleeting -d fleeting_jobs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
